version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sniper_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-sniper_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Opcional: Interface gráfica web para ver o banco (tipo PHPMyAdmin para Postgres)
  pgadmin:
    image: dpage/pgadmin4
    container_name: sniper_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sniper.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: